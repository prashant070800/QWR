[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line too long — handled by formatter
]

[tool.ruff.lint.isort]
known-first-party = ["telephony", "qwr_voicebot"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"


[tool.mypy]
python_version = "3.12"
strict = true
# Django + Channels stubs aren't fully typed; silence their internals
ignore_missing_imports = true
# Don't require return types on __init__
implicit_reexport = false

# Per-module overrides for third-party packages that ship no stubs
[[tool.mypy.overrides]]
module = [
    "channels.*",
    "daphne.*",
    "django.*",
]
ignore_missing_imports = true
