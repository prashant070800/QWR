<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova — AI Voice Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.06);
            --text-primary: #e8e8ed;
            --text-secondary: #8b8b9e;
            --accent: #6c5ce7;
            --accent-glow: rgba(108,92,231,0.3);
            --user-bubble: rgba(108,92,231,0.15);
            --assistant-bubble: rgba(255,255,255,0.04);
            --success: #00d2a0;
            --danger: #ff6b6b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            background: rgba(10,10,15,0.8);
            z-index: 10;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px; color: #fff;
        }
        .header-info h1 { font-size: 16px; font-weight: 600; }
        .header-info .status {
            font-size: 11px; color: var(--success);
            display: flex; align-items: center; gap: 4px;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .btn-clear {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-clear:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            animation: msg-in 0.3s cubic-bezier(0.16,1,0.3,1);
            word-wrap: break-word;
        }
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            border: 1px solid rgba(108,92,231,0.2);
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: var(--assistant-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .message .latency {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 6px;
            opacity: 0.6;
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 12px 18px;
            background: var(--assistant-bubble);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }
        .typing-indicator.active { display: flex; gap: 4px; align-items: center; }
        .typing-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 16px 24px 24px;
            border-top: 1px solid var(--border);
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(20px);
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-field {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus { border-color: rgba(108,92,231,0.4); }
        .input-field::placeholder { color: var(--text-secondary); }

        /* Mic button */
        .btn-mic {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            position: relative;
        }
        .btn-mic:hover { transform: scale(1.05); box-shadow: 0 0 24px var(--accent-glow); }
        .btn-mic.listening {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255,107,107,0.5); }
            70% { box-shadow: 0 0 0 14px rgba(255,107,107,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,107,107,0); }
        }
        .btn-mic svg { width: 20px; height: 20px; }

        /* Send button */
        .btn-send {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(108,92,231,0.2);
            color: var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-send:hover { background: rgba(108,92,231,0.35); }
        .btn-send svg { width: 18px; height: 18px; }

        .voice-status {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            min-height: 16px;
        }

        /* Speaking animation on assistant messages */
        .message.assistant.speaking {
            border-color: rgba(108,92,231,0.4);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        /* Error toast */
        .error-toast {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255,107,107,0.15);
            border: 1px solid rgba(255,107,107,0.3);
            color: var(--danger);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            z-index: 100;
            animation: toast-in 0.3s ease;
        }
        @keyframes toast-in {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="avatar">N</div>
            <div class="header-info">
                <h1>Nova</h1>
                <div class="status"><span class="status-dot"></span> Online</div>
            </div>
        </div>
        <button class="btn-clear" id="btnClear" title="Clear conversation">Clear Chat</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" class="input-field" id="inputField" placeholder="Type a message or hold mic to speak…" autocomplete="off">
            <button class="btn-mic" id="btnMic" title="Hold to speak">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </button>
            <button class="btn-send" id="btnSend" title="Send message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
        <div class="voice-status" id="voiceStatus"></div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputField = document.getElementById('inputField');
        const btnMic = document.getElementById('btnMic');
        const btnSend = document.getElementById('btnSend');
        const btnClear = document.getElementById('btnClear');
        const voiceStatus = document.getElementById('voiceStatus');
        const typingEl = document.createElement('div');
        typingEl.className = 'typing-indicator';
        typingEl.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

        let ws = null;
        let recognition = null;
        let isListening = false;
        let synth = window.speechSynthesis;

        // ---------- WebSocket ----------
        function connectWS() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${proto}://${location.host}/ws/chat/`);

            ws.onopen = () => console.log('WS connected');
            ws.onclose = () => {
                console.log('WS closed, reconnecting in 2s…');
                setTimeout(connectWS, 2000);
            };
            ws.onerror = (e) => console.error('WS error', e);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'typing') {
                    if (data.typing) {
                        messagesEl.appendChild(typingEl);
                        typingEl.classList.add('active');
                    } else {
                        typingEl.classList.remove('active');
                        typingEl.remove();
                    }
                    scrollBottom();
                } else if (data.type === 'message' && data.role === 'assistant') {
                    typingEl.classList.remove('active');
                    typingEl.remove();
                    addMessage('assistant', data.content);
                    speak(data.content);
                } else if (data.type === 'cleared') {
                    messagesEl.innerHTML = '';
                    addMessage('assistant', data.content);
                } else if (data.type === 'error') {
                    showError(data.content);
                }
            };
        }
        connectWS();

        // ---------- Messages ----------
        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            messagesEl.appendChild(div);
            scrollBottom();
            return div;
        }

        function scrollBottom() {
            requestAnimationFrame(() => {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            });
        }

        function sendMessage(text) {
            if (!text.trim()) return;
            addMessage('user', text.trim());
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'message', content: text.trim() }));
            }
            inputField.value = '';
            inputField.focus();
        }

        // ---------- Send handlers ----------
        btnSend.addEventListener('click', () => sendMessage(inputField.value));
        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(inputField.value);
            }
        });
        btnClear.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'clear' }));
            }
        });

        // ---------- Voice Input (Web Speech API) ----------
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-IN';

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                inputField.value = transcript;
                if (event.results[event.results.length - 1].isFinal) {
                    sendMessage(transcript);
                    stopListening();
                }
            };

            recognition.onend = () => stopListening();
            recognition.onerror = (e) => {
                if (e.error !== 'no-speech' && e.error !== 'aborted') {
                    showError('Mic error: ' + e.error);
                }
                stopListening();
            };

            btnMic.addEventListener('click', () => {
                if (isListening) {
                    recognition.stop();
                    stopListening();
                } else {
                    synth.cancel();
                    recognition.start();
                    startListening();
                }
            });
        } else {
            btnMic.style.display = 'none';
            voiceStatus.textContent = 'Voice input not supported in this browser';
        }

        function startListening() {
            isListening = true;
            btnMic.classList.add('listening');
            voiceStatus.textContent = '🎙️ Listening…';
            inputField.placeholder = 'Listening…';
        }

        function stopListening() {
            isListening = false;
            btnMic.classList.remove('listening');
            voiceStatus.textContent = '';
            inputField.placeholder = 'Type a message or click mic to speak…';
        }

        // ---------- Voice Output (SpeechSynthesis) ----------
        function speak(text) {
            if (!synth) return;
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 1.05;
            utter.pitch = 1.0;
            utter.lang = 'en-IN';

            const lastMsg = messagesEl.querySelector('.message.assistant:last-child');
            if (lastMsg) {
                utter.onstart = () => lastMsg.classList.add('speaking');
                utter.onend = () => lastMsg.classList.remove('speaking');
            }
            synth.speak(utter);
        }

        // ---------- Error toast ----------
        function showError(msg) {
            const el = document.createElement('div');
            el.className = 'error-toast';
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }
    </script>
</body>
</html>
